<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet", href="styles.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    </head>
    <body>
        <div class="hyperlinks">
            <a href="index.html"> Google search </a>
        </div>

        <div class="container">
            <form action="https://google.com/search">
                <div class="row">
                    <div class="col">all these words:</div><input class="col" type="text" name="as_q">
                </div>

                <div class="row">
                    <div class="col">this exact word or phrase:</div><input class="col" type="text" name="as_epq">
                </div>

                <div class="row">
                    <div class="col">any of these words:</div><input class="col" type="text" name="as_oq">
                </div>

                <div class="row">
                    <div class="col">none of these words:</div><input class="col" type="text" name="as_eq">
                </div>

                <input id="advanced_search_button" type="submit" value="Google Search">
            </form>

        </div>
    </body>
</html>
